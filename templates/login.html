<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SHAYAN_EXPLORER OSINT</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 16px; backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); width: 320px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        h2 { text-align: center; color: #00f2fe; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .error { color: #ff5252; font-size: 13px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>SHAYAN Portal</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Authenticate</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
    </div>
</body>
</html>
